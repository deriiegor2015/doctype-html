<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebVPN Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">WebVPN Control</h1>

    <div class="mb-4">
      <label for="serverSelect" class="block text-sm font-medium text-gray-700 mb-2">Локація сервера:</label>
      <select id="serverSelect" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        <option value="Germany">Europe — Germany</option>
        <option value="Lagos">Africa — Lagos</option>
        <option value="Kazakhstan">Asia — Kazakhstan</option>
      </select>
    </div>

    <button id="connectBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
      Підключитися
    </button>
    <button id="disconnectBtn" class="hidden w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition duration-200 mt-2">
      Відключитися
    </button>

    <div id="status" class="mt-4 p-3 rounded-lg text-center font-medium hidden"></div>
  </div>

  <script>
    const socket = io('http://localhost:3000');
    let pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');

    function updateStatus(msg, color) {
        statusEl.textContent = msg;
        statusEl.className = `mt-4 p-3 rounded-lg text-center font-medium bg-${color}-100 text-${color}-800`;
        statusEl.classList.remove('hidden');
    }

    // 1. Обробка ICE кандидатів (КРИТИЧНО ВАЖЛИВО)
    pc.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit('ice-candidate', event.candidate);
        }
    };

    // Отримання кандидатів від сервера
    socket.on('ice-candidate', async (candidate) => {
        try {
            await pc.addIceCandidate(new RTCIceCandidate(candidate));
        } catch (e) {
            console.error("Помилка додавання ICE кандидата:", e);
        }
    });

    pc.onconnectionstatechange = () => {
        if(pc.connectionState === 'connected') {
            updateStatus('VPN підключено!', 'green');
            connectBtn.classList.add('hidden');
            disconnectBtn.classList.remove('hidden');
        }
        if(pc.connectionState === 'disconnected' || pc.connectionState === 'closed') {
            updateStatus('VPN відключено', 'yellow');
            connectBtn.classList.remove('hidden');
            disconnectBtn.classList.add('hidden');
        }
    };

    connectBtn.onclick = async () => {
        try {
            updateStatus('Встановлення зв’язку...', 'blue');
            socket.emit('selectServer', { server: document.getElementById('serverSelect').value });
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('offer', offer);
        } catch (err) {
            updateStatus('Помилка: ' + err.message, 'red');
        }
    };

    disconnectBtn.onclick = () => {
        pc.close();
        // Створюємо новий об'єкт підключення для наступного разу
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        updateStatus('Відключено', 'gray');
        connectBtn.classList.remove('hidden');
        disconnectBtn.classList.add('hidden');
    };

    socket.on('answer', async (answer) => {
        await pc.setRemoteDescription(answer);
    });
  </script>
</body>
</html>
